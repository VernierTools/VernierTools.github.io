<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Random string — Vernier</title>
<script>(function(){try{var m=localStorage.getItem('tb.theme');var d=m?m==='dark':matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();</script>
<link rel="stylesheet" href="../../shared/shell.css?v=3">
<style>
  .lenrow{ display:flex; align-items:center; gap:var(--s4); }
  .lenrow .slider{ flex:1; }
  .lenrow .input{ width:82px; text-align:center; font-family:var(--font-mono); font-variant-numeric:tabular-nums; }

  .togcol{ display:flex; flex-direction:column; gap:var(--s3); }
  .toggle .tlbl{ line-height:1.35; }

  .count-in{ max-width:120px; text-align:center; font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
  #exclude-field, #custom{ font-family:var(--font-mono); }

  .hint{ font-size:12px; color:var(--text-3); margin-top:var(--s3); line-height:1.45; }

  /* 個別選択（チップ） */
  .pickbtn{ margin-top:var(--s3); display:inline-flex; align-items:center; gap:6px; background:transparent; border:0;
    color:var(--accent); font:inherit; font-size:12.5px; font-weight:500; cursor:pointer; padding:2px 0; }
  .pickbtn svg{ width:14px; height:14px; transition:transform var(--tap); }
  .pickbtn[aria-expanded="true"] svg{ transform:rotate(90deg); }
  .pickpanel{ margin-top:var(--s3); padding:var(--s3); background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r); }
  .chipgroup + .chipgroup{ margin-top:var(--s3); }
  .chipgroup__h{ font-size:11px; color:var(--text-3); margin-bottom:6px; }
  .chipgrid{ display:flex; flex-wrap:wrap; gap:5px; }
  .cchip{ appearance:none; cursor:pointer; font-family:var(--font-mono); font-size:13px; line-height:1;
    min-width:26px; height:28px; padding:0 6px; border:1px solid var(--border-strong); border-radius:var(--r-sm);
    background:var(--surface); color:var(--text); transition:all var(--tap); }
  .cchip[aria-pressed="false"]{ background:var(--surface-2); color:var(--text-3); border-style:dashed; text-decoration:line-through; }
  .cchip:hover{ border-color:var(--accent); }
  .pick-actions{ display:flex; justify-content:flex-end; margin-top:var(--s3); }
  .pick-actions .btn{ height:30px; font-size:12px; }

  .results{ min-height:46px; }
  .res{ font-family:var(--font-mono); font-size:15px; line-height:1.5; padding:var(--s3) var(--s4);
    cursor:pointer; word-break:break-all; color:var(--text); transition:background var(--tap); display:flex; gap:10px; }
  .res + .res{ border-top:1px solid var(--border); }
  .res:hover{ background:var(--surface); }
  .res__i{ color:var(--text-3); user-select:none; font-size:12px; flex:0 0 auto; min-width:22px; text-align:right; padding-top:1px; }
  .results.batch{ max-height:340px; overflow:auto; }
  .res--empty{ color:var(--text-3); font-family:var(--font-sans); font-size:13px; cursor:default; }
  .res--empty:hover{ background:transparent; }

  .copyall{ height:28px; padding:0 10px; font-size:12px; }
  .copyall svg{ width:13px; height:13px; }

  #m-combos{ font-size:17px; }
  .warnrow{ padding:0 var(--s4) var(--s4); }
</style>
</head>
<body>
<main class="shell">
  <div class="toolhead">
    <div class="chips"><span class="chip" data-i18n="cat.general">General</span></div>
    <h1 data-i18n="t.title">Random string</h1>
    <p data-i18n="t.desc">Generate secure random strings with full control over the character set.</p>
  </div>

  <div class="work">
    <!-- 左: 操作 -->
    <div>
      <div class="card">
        <div class="field">
          <label class="label" for="len-num" data-i18n="t.length">Length</label>
          <div class="lenrow">
            <input type="range" class="slider" id="len-range" min="1" max="128" value="16" aria-label="Length">
            <input type="number" class="input" id="len-num" min="1" max="128" value="16" inputmode="numeric" aria-label="Length">
          </div>
        </div>

        <div class="field">
          <label class="label" data-i18n="t.basic">Letters, digits, symbols</label>
          <div class="togcol">
            <label class="toggle"><input type="checkbox" id="g-lower" checked><span class="track"></span><span class="tlbl" data-i18n="t.lower">Lowercase (a–z)</span></label>
            <label class="toggle"><input type="checkbox" id="g-upper" checked><span class="track"></span><span class="tlbl" data-i18n="t.upper">Uppercase (A–Z)</span></label>
            <label class="toggle"><input type="checkbox" id="g-digits" checked><span class="track"></span><span class="tlbl" data-i18n="t.digits">Digits (0–9)</span></label>
            <label class="toggle"><input type="checkbox" id="g-symbols"><span class="track"></span><span class="tlbl" data-i18n="t.symbols">Symbols</span></label>
          </div>
          <button type="button" class="pickbtn" id="pick-toggle" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
            <span data-i18n="t.pick">Pick individual characters</span>
          </button>
          <div class="pickpanel" id="pick-panel" hidden>
            <div id="chipgrids"></div>
            <div class="pick-actions">
              <button type="button" class="btn btn--ghost" id="pick-reset"><span data-i18n="t.pickreset">Reset selection</span></button>
            </div>
            <div class="hint" data-i18n="t.pickhint">Click a character to switch it off.</div>
          </div>
        </div>

        <div class="field">
          <label class="label" data-i18n="t.scripts">Scripts</label>
          <div class="togcol">
            <label class="toggle"><input type="checkbox" id="g-hiragana"><span class="track"></span><span class="tlbl" data-i18n="t.hiragana">Hiragana</span></label>
            <label class="toggle"><input type="checkbox" id="g-katakana"><span class="track"></span><span class="tlbl" data-i18n="t.katakana">Katakana</span></label>
            <label class="toggle"><input type="checkbox" id="g-cyrillic"><span class="track"></span><span class="tlbl" data-i18n="t.cyrillic">Cyrillic</span></label>
            <label class="toggle"><input type="checkbox" id="g-greek"><span class="track"></span><span class="tlbl" data-i18n="t.greek">Greek</span></label>
            <label class="toggle"><input type="checkbox" id="g-hangul"><span class="track"></span><span class="tlbl" data-i18n="t.hangul">Hangul</span></label>
            <label class="toggle"><input type="checkbox" id="g-kanji"><span class="track"></span><span class="tlbl" data-i18n="t.kanji">Jōyō kanji</span></label>
          </div>
        </div>

        <div class="field">
          <label class="label" for="exclude-field" data-i18n="t.excludeChars">Exclude characters</label>
          <input class="input" id="exclude-field" data-i18n-ph="t.excludeCharsPh" placeholder="Characters typed here are never used" autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>

        <div class="field">
          <label class="label" for="custom" data-i18n="t.customAdd">Extra characters</label>
          <input class="input" id="custom" data-i18n-ph="t.customAddPh" placeholder="Used in addition to the selected types (paste OK)" autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>

        <div class="field">
          <label class="label" data-i18n="t.options">Options</label>
          <div class="togcol">
            <label class="toggle"><input type="checkbox" id="o-exclude"><span class="track"></span><span class="tlbl" data-i18n="t.exclude">Exclude look-alike characters</span></label>
            <label class="toggle"><input type="checkbox" id="o-norepeat"><span class="track"></span><span class="tlbl" data-i18n="t.norepeat">No repeated characters</span></label>
            <label class="toggle"><input type="checkbox" id="o-eachtype"><span class="track"></span><span class="tlbl" data-i18n="t.eachtype">Include at least one of each type</span></label>
          </div>
        </div>

        <div class="field">
          <label class="label" for="count" data-i18n="t.count">How many</label>
          <input type="number" class="input count-in" id="count" min="1" max="100" value="1" inputmode="numeric">
        </div>

        <button class="btn btn--primary btn--block" id="gen" style="margin-top:var(--s5)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
          <span data-i18n="t.generate">Generate</span>
        </button>
        <div class="hint" id="dirty" hidden data-i18n="t.dirty">Settings changed — press Generate to update.</div>
      </div>
    </div>

    <!-- 右: 結果 + 計器表示 -->
    <div>
      <div class="readout" style="margin-bottom:var(--s4)">
        <div class="readout__head">
          <span class="eyebrow" data-i18n="t.result">Result</span>
          <button class="btn btn--ghost copyall" id="copyall" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
            <span data-i18n="t.copyall">Copy all</span>
          </button>
        </div>
        <div id="results" class="results"></div>
        <div class="copyhint" data-i18n="t.copyhint">Click a string to copy.</div>
      </div>

      <div class="readout">
        <div class="readout__head">
          <span class="eyebrow" data-i18n="t.strength">Strength</span>
          <span class="badge badge--muted" id="strength-badge"><span class="d"></span><span id="strength-lbl">—</span></span>
        </div>
        <div class="rrow rrow--hero">
          <span class="rrow__label" data-i18n="t.entropy">Entropy</span>
          <span class="rrow__value"><span id="m-bits">0</span><span class="u" data-i18n="t.bit">bit</span></span>
        </div>
        <div class="rrow">
          <span class="rrow__label" data-i18n="t.alphabet">Character set size</span>
          <span class="rrow__value"><span id="m-alpha">0</span><span class="u" data-i18n="t.charsunit">chars</span></span>
        </div>
        <div class="rrow">
          <span class="rrow__label" data-i18n="t.combos">Total patterns</span>
          <span class="rrow__value" id="m-combos">—</span>
        </div>
        <div class="warnrow"><div class="badges" id="warnings"></div></div>
      </div>
    </div>
  </div>
</main>

<script src="../../shared/shell.js?v=3"></script>

      "t.wEmpty": "\u4f7f\u7528\u3067\u304d\u308b\u6587\u5b57\u304c\u3042\u308a\u307e\u305b\u3093\u3002\u6587\u5b57\u7a2e\u3092ON\u306b\u3059\u308b\u304b\u6587\u5b57\u3092\u8ffd\u52a0\u3057\u3066\u304f\u3060\u3055\u3044\u3002",
      "t.wClamp": "\u9577\u3055\u3092\u6587\u5b57\u96c6\u5408\u30b5\u30a4\u30ba\u306b\u5408\u308f\u305b\u307e\u3057\u305f\uff08\u91cd\u8907\u306a\u3057\uff09\u3002",
      "t.wEachLong": "\u9577\u3055\u304c\u9078\u629e\u3057\u305f\u6587\u5b57\u7a2e\u6570\u3088\u308a\u77ed\u3044\u305f\u3081\u3001\u4e00\u90e8\u306e\u7a2e\u985e\u3092\u542b\u3081\u3089\u308c\u307e\u305b\u3093\u3002",
      "t.wEachNote": "\u300c\u5404\u7a2e\u3092\u542b\u3081\u308b\u300d\u6709\u52b9\u6642\u3001\u30a8\u30f3\u30c8\u30ed\u30d4\u30fc\u306f\u4e0a\u9650\u5024\u3067\u3059\u3002"
    }
  };
  function T(k) { if (window.Shell && Shell.t) return Shell.t(k); return (STR.en[k] != null) ? STR.en[k] : k; }
  function doCopy(text, el) {
    if (window.Shell && Shell.copy) { Shell.copy(text, el); return; }
    try { navigator.clipboard && navigator.clipboard.writeText(String(text)); } catch (e) {}
  }

  // ===== 乱数（リジェクションサンプリング） =====
  function secureRandomInt(n) {
    if (n <= 1) return 0;
    var bytesNeeded = n <= 256 ? 1 : n <= 65536 ? 2 : 4;
    var maxVal = Math.pow(256, bytesNeeded);
    var limit = maxVal - (maxVal % n);
    var buf = new Uint8Array(bytesNeeded);
    while (true) {
      crypto.getRandomValues(buf);
      var x = 0; for (var i = 0; i < bytesNeeded; i++) x = x * 256 + buf[i];
      if (x < limit) return x % n;
    }
  }
  function clampInt(v, min, max, def) { var n = parseInt(v, 10); if (isNaN(n)) n = def; if (n < min) n = min; if (n > max) n = max; return n; }
  function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = secureRandomInt(i + 1); var t = a[i]; a[i] = a[j]; a[j] = t; } }

  // ===== 文字集合の構築 =====
  function activeGroupIds() { return GROUP_LIST.filter(function (id) { return $("g-" + id).checked; }); }
  function exclusionSet() {
    var set = Object.create(null);
    if ($("o-exclude").checked) Array.from(AMBIG).forEach(function (c) { set[c] = 1; });
    Array.from($("exclude-field").value).forEach(function (c) { set[c] = 1; });
    for (var c in excludedChip) if (excludedChip[c]) set[c] = 1;
    return set;
  }
  function buildAlphabet() {
    var ex = exclusionSet();
    var ids = activeGroupIds();
    var seen = Object.create(null);
    var chars = [];
    var cats = [];   // each-type 用（有効グループの残存文字・配列）
    ids.forEach(function (id) {
      var arr = GROUP_ARR[id], cat = [];
      for (var i = 0; i < arr.length; i++) { var ch = arr[i]; if (ex[ch] || seen[ch]) continue; seen[ch] = 1; chars.push(ch); cat.push(ch); }
      if (cat.length) cats.push(cat);
    });
    var custom = Array.from($("custom").value);   // 追加（積み増し）。each-type の種別には数えない
    for (var j = 0; j < custom.length; j++) { var cc = custom[j]; if (ex[cc] || seen[cc]) continue; seen[cc] = 1; chars.push(cc); }
    return { chars: chars, cats: cats };
  }
  function getConfig() {
    var ab = buildAlphabet();
    var N = ab.chars.length;
    var reqLen = clampInt($("len-num").value, 1, 128, 16);
    var noRepeat = $("o-norepeat").checked;
    var eachType = $("o-eachtype").checked;
    var count = clampInt($("count").value, 1, 100, 1);
    var warnings = [];
    var effLen = reqLen;
    if (N === 0) warnings.push("empty");
    if (noRepeat && N > 0 && reqLen > N) { effLen = N; warnings.push("clamp"); }
    if (eachType && ab.cats.length > 0 && effLen < ab.cats.length) warnings.push("eachlong");
    return { chars: ab.chars, cats: ab.cats, N: N, length: effLen, noRepeat: noRepeat, eachType: eachType, count: count, warnings: warnings };
  }

  // ===== 1本生成 =====
  function generateOne(cfg) {
    var chars = cfg.chars, N = chars.length, L = cfg.length, noRepeat = cfg.noRepeat;
    var cats = (cfg.eachType && cfg.cats.length > 0 && L >= cfg.cats.length) ? cfg.cats : [];
    var out;
    if (!noRepeat) {
      out = [];
      for (var ci = 0; ci < cats.length; ci++) out.push(cats[ci][secureRandomInt(cats[ci].length)]);
      while (out.length < L) out.push(chars[secureRandomInt(N)]);
    } else {
      // 各カテゴリから1文字確保 → 残りを袋（swap削除）から重複なしで補充
      var reserved = [], usedMap = Object.create(null);
      for (var c2 = 0; c2 < cats.length; c2++) { var ch = cats[c2][secureRandomInt(cats[c2].length)]; reserved.push(ch); usedMap[ch] = 1; }
      var bag = []; for (var b = 0; b < chars.length; b++) if (!usedMap[chars[b]]) bag.push(chars[b]);
      out = reserved.slice();
      var need = L - reserved.length, bagLen = bag.length;
      for (var k = 0; k < need && bagLen > 0; k++) { var idx = secureRandomInt(bagLen); out.push(bag[idx]); bag[idx] = bag[bagLen - 1]; bagLen--; }
    }
    shuffle(out);
    return out.join("");
  }

  // ===== エントロピー =====
  function bitsFor(N, L, noRepeat) {
    if (N <= 1 || L <= 0) return 0;
    if (!noRepeat) return L * Math.log2(N);
    var bb = 0, kk = Math.min(L, N);
    for (var i = 0; i < kk; i++) bb += Math.log2(N - i);
    return bb;
  }
  function fmtCombos(bits) {
    if (bits <= 0) return "1";
    var log10 = bits * Math.LN2 / Math.LN10;
    if (log10 < 6) return Math.round(Math.pow(2, bits)).toLocaleString();
    var exp = Math.floor(log10), mant = Math.pow(10, log10 - exp);
    return mant.toFixed(2) + " \u00d7 10^" + exp;
  }

  // ===== 出力 =====
  function escHtml(s) { return String(s).replace(/[&<>]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]; }); }
  function escAttr(s) { return String(s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

  var resultsEl = $("results"), copyallBtn = $("copyall"), dirtyEl = $("dirty");

  function renderEmpty() {
    resultsEl.className = "results";
    resultsEl.innerHTML = '<div class="res res--empty">' + escHtml(T("t.empty")) + "</div>";
    copyallBtn.hidden = true;
  }
  function renderResults(arr, cfg) {
    var batch = cfg.count > 1;
    resultsEl.className = "results" + (batch ? " batch" : "");
    resultsEl.innerHTML = arr.map(function (s, i) {
      var idx = batch ? '<span class="res__i">' + (i + 1) + "</span>" : "";
      return '<div class="res" data-copy="' + escAttr(s) + '">' + idx + "<span>" + escHtml(s) + "</span></div>";
    }).join("");
    copyallBtn.hidden = !batch;
    copyallBtn._all = arr.join("\n");
  }

  function setStrength(bits, cfg) {
    var lbl, cls;
    if (cfg.N === 0) { lbl = "\u2014"; cls = "badge--muted"; }
    else if (bits < 40) { lbl = T("t.weak"); cls = "badge--neg"; }
    else if (bits < 72) { lbl = T("t.ok"); cls = "badge--muted"; }
    else if (bits < 112) { lbl = T("t.strong"); cls = "badge--pos"; }
    else { lbl = T("t.vstrong"); cls = "badge--pos"; }
    $("strength-badge").className = "badge " + cls;
    $("strength-lbl").textContent = lbl;
  }
  function renderWarnings(cfg) {
    var w = [];
    cfg.warnings.forEach(function (code) {
      var key = code === "empty" ? "t.wEmpty" : code === "clamp" ? "t.wClamp" : code === "eachlong" ? "t.wEachLong" : null;
      if (key) w.push({ key: key, neg: code === "empty" });
    });
    if (cfg.eachType && cfg.cats.length > 0 && cfg.length >= cfg.cats.length) w.push({ key: "t.wEachNote", neg: false });
    $("warnings").innerHTML = w.map(function (o) {
      return '<span class="badge ' + (o.neg ? "badge--neg" : "badge--muted") + '"><span class="d"></span>' + escHtml(T(o.key)) + "</span>";
    }).join("");
  }
  function updateMetrics(cfg) {
    cfg = cfg || getConfig();
    var bits = bitsFor(cfg.N, cfg.length, cfg.noRepeat);
    $("m-bits").textContent = bits <= 0 ? "0" : (bits >= 100 ? String(Math.round(bits)) : bits.toFixed(1));
    $("m-alpha").textContent = cfg.N;
    $("m-combos").textContent = cfg.N === 0 ? "\u2014" : fmtCombos(bits);
    setStrength(bits, cfg);
    renderWarnings(cfg);
    $("gen").disabled = cfg.N === 0;
  }

  function generate() {
    var cfg = getConfig();
    updateMetrics(cfg);
    if (cfg.N === 0) { renderEmpty(); return; }
    var arr = [];
    for (var i = 0; i < cfg.count; i++) arr.push(generateOne(cfg));
    renderResults(arr, cfg);
    hasGenerated = true;
    dirtyEl.hidden = true;
  }

  // ===== チップ（ASCII の個別選択） =====
  var pickPanel = $("pick-panel"), pickToggle = $("pick-toggle");
  function renderChips() {
    var html = "";
    ASCII_LIST.forEach(function (id) {
      if (!$("g-" + id).checked) return;
      var chips = GROUP_ARR[id].map(function (ch) {
        var on = !excludedChip[ch];
        return '<button type="button" class="cchip" data-ch="' + escAttr(ch) + '" aria-pressed="' + on + '">' + escHtml(ch) + "</button>";
      }).join("");
      html += '<div class="chipgroup"><div class="chipgroup__h">' + escHtml(T("t." + id)) + '</div><div class="chipgrid">' + chips + "</div></div>";
    });
    $("chipgrids").innerHTML = html || '<div class="hint">' + escHtml(T("t.picknone")) + "</div>";
  }
  pickToggle.addEventListener("click", function () {
    var open = pickPanel.hidden;
    pickPanel.hidden = !open;
    pickToggle.setAttribute("aria-expanded", String(open));
    if (open) renderChips();
  });
  $("chipgrids").addEventListener("click", function (e) {
    var b = e.target.closest(".cchip"); if (!b) return;
    var ch = b.getAttribute("data-ch");
    if (excludedChip[ch]) delete excludedChip[ch]; else excludedChip[ch] = 1;
    b.setAttribute("aria-pressed", String(!excludedChip[ch]));
    core();
  });
  $("pick-reset").addEventListener("click", function () { excludedChip = Object.create(null); renderChips(); core(); });

  // ===== 変更ハンドリング =====
  function core() { updateMetrics(); if (hasGenerated) dirtyEl.hidden = false; }

  var lenRange = $("len-range"), lenNum = $("len-num"), countEl = $("count");
  lenRange.addEventListener("input", function () { lenNum.value = lenRange.value; core(); });
  lenNum.addEventListener("input", function () { lenRange.value = clampInt(lenNum.value, 1, 128, 16); core(); });
  lenNum.addEventListener("blur", function () { lenNum.value = clampInt(lenNum.value, 1, 128, 16); lenRange.value = lenNum.value; core(); });
  countEl.addEventListener("input", core);
  countEl.addEventListener("blur", function () { countEl.value = clampInt(countEl.value, 1, 100, 1); core(); });

  GROUP_LIST.forEach(function (id) {
    $("g-" + id).addEventListener("change", function () { if (!pickPanel.hidden) renderChips(); core(); });
  });
  ["o-exclude", "o-norepeat", "o-eachtype"].forEach(function (id) { $(id).addEventListener("change", core); });
  $("exclude-field").addEventListener("input", core);
  $("custom").addEventListener("input", core);

  [lenNum, countEl, $("exclude-field"), $("custom")].forEach(function (el) {
    el.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); generate(); } });
  });
  $("gen").addEventListener("click", generate);
  copyallBtn.addEventListener("click", function () { doCopy(copyallBtn._all || "", copyallBtn); });

  // ===== 起動 =====
  if (typeof Shell !== "undefined" && Shell && typeof Shell.init === "function") {
    Shell.init({ id: "random-string", strings: STR, onSettingsChange: function () { if (!pickPanel.hidden) renderChips(); updateMetrics(); } });
  }
  updateMetrics();
  generate();
})();
</script>
</body>
</html>
