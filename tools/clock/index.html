<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clock hand angles — toolbench</title>
<script>(function(){try{var m=localStorage.getItem('tb.theme');var d=m?m==='dark':matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();</script>
<link rel="stylesheet" href="../../shared/shell.css?v=1">
<style>
  .clockface{ background:var(--surface); }
  .clockface svg{ display:block; width:100%; height:auto; }
  .grab{ cursor:grab; touch-action:none; }
  .grab:active{ cursor:grabbing; }
  #knob:focus-visible{ outline:none; }

  .timein{ display:flex; align-items:center; gap:var(--s2); }
  .timein .input{ width:100%; text-align:center; font-family:var(--font-mono);
    font-variant-numeric:tabular-nums; font-size:18px; letter-spacing:.02em; padding:0 8px; }
  .timein .colon{ color:var(--text-3); font-weight:600; }

  .seg{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .seg--2{ grid-template-columns:repeat(2,1fr); }
  .seg button{ appearance:none; cursor:pointer; font:inherit; font-size:13px; font-weight:500;
    height:38px; border:1px solid var(--border-strong); border-radius:var(--r); background:var(--surface);
    color:var(--text-2); transition:all var(--tap); }
  .seg button:hover{ border-color:var(--text-3); }
  .seg button[aria-pressed="true"]{ background:var(--accent); border-color:var(--accent); color:#fff; }

  .adjust{ display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .adjust .btn{ height:40px; font-variant-numeric:tabular-nums; }
  .quickset{ display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:var(--s4); }
  .quickset .btn{ height:42px; }

  .hint{ font-size:12px; color:var(--text-3); margin-top:var(--s3); }

  /* readout: 各針で右側/左側の両方を常時表示 */
  .ro-head{ display:grid; grid-template-columns:1fr 80px 80px; gap:var(--s3); padding:8px var(--s4) 4px; }
  .ro-head span{ font-size:10.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--text-3); text-align:right; }
  .rrow2{ display:grid; grid-template-columns:1fr 80px 80px; gap:var(--s3); align-items:baseline; padding:var(--s3) var(--s4); }
  .rrow2 + .rrow2{ border-top:1px solid var(--border); }
  .rrow2 .lbl{ font-size:13px; color:var(--text-2); }
  .rrow2 .v{ font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-size:17px; text-align:right; cursor:pointer; }
  .rrow2 .v--r{ color:var(--accent); }
  .rrow2 .v--l{ color:var(--text-2); }
</style>
</head>
<body>
<main class="shell">
  <div class="toolhead">
    <div class="chips"><span class="chip" data-i18n="cat.general">General</span></div>
    <h1 data-i18n="t.title">Clock hand angles</h1>
    <p data-i18n="t.desc">Set a time and see how far the selected hand has rotated from the 12 o'clock position.</p>
  </div>

  <div class="work">
    <!-- 左: 時刻入力・調整 -->
    <div>
      <div class="card">
        <div class="field">
          <label class="label" data-i18n="t.time">Time</label>
          <div class="timein">
            <input class="input" id="in-h" type="number" min="0" max="23" inputmode="numeric" aria-label="Hours">
            <span class="colon">:</span>
            <input class="input" id="in-m" type="number" min="0" max="59" inputmode="numeric" aria-label="Minutes">
            <span class="colon">:</span>
            <input class="input" id="in-s" type="number" min="0" max="59" inputmode="numeric" aria-label="Seconds">
          </div>
        </div>
        <div class="field">
          <label class="label" data-i18n="t.adjust">Adjust</label>
          <div class="adjust" id="adjust">
            <button class="btn btn--secondary" data-adj="3600">+1<span class="au" data-u="h"></span></button>
            <button class="btn btn--secondary" data-adj="-3600">−1<span class="au" data-u="h"></span></button>
            <button class="btn btn--secondary" data-adj="60">+1<span class="au" data-u="m"></span></button>
            <button class="btn btn--secondary" data-adj="-60">−1<span class="au" data-u="m"></span></button>
            <button class="btn btn--secondary" data-adj="1">+1<span class="au" data-u="s"></span></button>
            <button class="btn btn--secondary" data-adj="-1">−1<span class="au" data-u="s"></span></button>
          </div>
          <div class="quickset">
            <button class="btn btn--secondary" id="now">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              <span data-i18n="t.now">Set to now</span>
            </button>
            <button class="btn btn--secondary" id="reset">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 4 3 10 9 10"/><path d="M3.5 14a9 9 0 1 0 2-9.3L3 10"/></svg>
              <span data-i18n="t.reset">Reset</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 右: 時計 → 針選択（独立コーナー）→ 出力 -->
    <div>
      <div class="preview clockface" style="margin-bottom:var(--s4)">
        <svg viewBox="0 0 200 200" role="img" aria-label="Analog clock with hour ring slider">
          <circle id="ring-hit" class="grab" cx="100" cy="100" r="92" fill="none" stroke="rgba(0,0,0,0)"
                  stroke-width="16" pointer-events="stroke"></circle>
          <circle cx="100" cy="100" r="92" fill="none" stroke="var(--border-strong)" stroke-width="2"></circle>
          <path id="ring-prog" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"></path>
          <circle cx="100" cy="100" r="82" fill="var(--surface-2)" stroke="var(--border)"></circle>
          <path id="arc" fill="var(--accent-tint)" stroke="none"></path>
          <g id="ticks" stroke="var(--text-3)" stroke-linecap="round"></g>
          <line id="h-hour"   x1="100" y1="100" x2="100" y2="56" stroke-width="5"   stroke-linecap="round"></line>
          <line id="h-minute" x1="100" y1="100" x2="100" y2="38" stroke-width="3.5" stroke-linecap="round"></line>
          <line id="h-second" x1="100" y1="100" x2="100" y2="32" stroke-width="2"   stroke-linecap="round"></line>
          <line id="h-hour-hit" class="grab" x1="100" y1="100" x2="100" y2="56" stroke="rgba(0,0,0,0)"
                stroke-width="18" stroke-linecap="round" pointer-events="stroke"></line>
          <circle cx="100" cy="100" r="4.5" fill="var(--accent)"></circle>
          <circle id="knob" class="grab" cx="100" cy="8" r="6.5" fill="var(--accent)" stroke="var(--surface)"
                  stroke-width="2" tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="360"></circle>
          <text id="arc-label" text-anchor="middle" font-family="var(--font-mono)" font-size="13"
                font-weight="600" fill="var(--accent)"></text>
        </svg>
      </div>

      <!-- 針選択（独立コーナー）: 針の選択 + 表示する側 -->
      <div class="card" style="margin-bottom:var(--s4)">
        <label class="label" data-i18n="t.hand">Angle for</label>
        <div class="seg" id="seg" role="group">
          <button data-hand="hour"   data-i18n="t.hour">Hour hand</button>
          <button data-hand="minute" data-i18n="t.minute">Minute hand</button>
          <button data-hand="second" data-i18n="t.second">Second hand</button>
        </div>
        <label class="label" style="margin-top:var(--s4)" data-i18n="t.side">Side shown on clock</label>
        <div class="seg seg--2" id="seg-side" role="group">
          <button data-side="left"  data-i18n="t.left">Left</button>
          <button data-side="right" data-i18n="t.right">Right</button>
        </div>
        <div class="hint" data-i18n="t.ringhint">Drag the outer ring or the hour hand — one full turn is 12 hours.</div>
      </div>

      <!-- 出力: 各針の右側・左側を常時表示 -->
      <div class="readout">
        <div class="readout__head"><span class="eyebrow" data-i18n="t.output">Output</span>
          <span class="live"><span class="dot"></span> live</span></div>
        <div class="ro-head"><span></span><span data-i18n="t.right">Right</span><span data-i18n="t.left">Left</span></div>
        <div class="rrow2"><span class="lbl" data-i18n="t.hour">Hour hand</span>
          <span class="v v--r" id="ro-hour-r" data-copy="">0°</span><span class="v v--l" id="ro-hour-l" data-copy="">0°</span></div>
        <div class="rrow2"><span class="lbl" data-i18n="t.minute">Minute hand</span>
          <span class="v v--r" id="ro-minute-r" data-copy="">0°</span><span class="v v--l" id="ro-minute-l" data-copy="">0°</span></div>
        <div class="rrow2"><span class="lbl" data-i18n="t.second">Second hand</span>
          <span class="v v--r" id="ro-second-r" data-copy="">0°</span><span class="v v--l" id="ro-second-l" data-copy="">0°</span></div>
        <div class="copyhint" data-i18n="t.copyhint">Click any value to copy.</div>
      </div>
    </div>
  </div>
</main>

<script src="../../shared/shell.js?v=1"></script>
<script>
"use strict";
(function () {
  var total = 3 * 3600 + 27 * 60 + 15;   // 03:27:15
  var sel = "hour";
  var side = "right";

  var $ = function (id) { return document.getElementById(id); };
  var inH = $("in-h"), inM = $("in-m"), inS = $("in-s");
  var arc = $("arc"), arcLabel = $("arc-label"), ringProg = $("ring-prog"), knob = $("knob");
  var hHour = $("h-hour"), hMin = $("h-minute"), hSec = $("h-second"), hHourHit = $("h-hour-hit");
  var svg = document.querySelector(".clockface svg");

  (function ticks() {
    var g = $("ticks"), s = "";
    for (var i = 0; i < 12; i++) {
      var a = i * 30 * Math.PI / 180;
      var x = 100 + Math.sin(a) * 72, y = 100 - Math.cos(a) * 72;
      var x2 = 100 + Math.sin(a) * 79, y2 = 100 - Math.cos(a) * 79;
      var w = (i % 3 === 0) ? 2.4 : 1.2;
      s += '<line x1="' + f(x) + '" y1="' + f(y) + '" x2="' + f(x2) + '" y2="' + f(y2) + '" stroke-width="' + w + '"/>';
    }
    g.innerHTML = s;
  })();

  function f(n) { return Math.round(n * 100) / 100; }
  function mod(x, n) { return ((x % n) + n) % n; }
  function norm(a) { return mod(a, 360); }
  function fmt(deg) { var v = Math.round(deg * 10) / 10; return Number.isInteger(v) ? v.toFixed(0) : v.toFixed(1); }
  function pt(a, r) { var rad = a * Math.PI / 180; return [100 + r * Math.sin(rad), 100 - r * Math.cos(rad)]; }

  function angles() {
    var s = mod(total, 60), m = Math.floor(mod(total, 3600) / 60), h = Math.floor(mod(total, 86400) / 3600);
    return { h: h, m: m, s: s,
      hour:   norm((mod(total, 43200) / 43200) * 360),
      minute: norm(m * 6 + s * 0.1),
      second: norm(s * 6) };
  }

  // clockwise sector from a1 to a2 (a2>=a1)
  function sectorSpan(a1, a2, r) {
    var span = a2 - a1; if (span < 0.05) return "";
    if (span > 359.95) span = 359.95, a2 = a1 + span;
    var A = pt(a1, r), B = pt(a2, r), large = span > 180 ? 1 : 0;
    return "M100 100 L" + f(A[0]) + " " + f(A[1]) + " A" + r + " " + r + " 0 " + large + " 1 " + f(B[0]) + " " + f(B[1]) + " Z";
  }
  function strokeArc(deg, r) {
    if (deg < 0.05) return ""; if (deg > 359.95) deg = 359.95;
    var A = pt(0, r), B = pt(deg, r), large = deg > 180 ? 1 : 0;
    return "M" + f(A[0]) + " " + f(A[1]) + " A" + r + " " + r + " 0 " + large + " 1 " + f(B[0]) + " " + f(B[1]);
  }
  function setHand(line, deg, selected, base) {
    line.setAttribute("transform", "rotate(" + f(deg) + " 100 100)");
    line.setAttribute("stroke", selected ? "var(--accent)" : base);
  }
  function setVal(el, deg) { var t = fmt(deg) + "°"; el.textContent = t; el.setAttribute("data-copy", t); }

  function render() {
    var a = angles();
    if (document.activeElement !== inH) inH.value = a.h;
    if (document.activeElement !== inM) inM.value = a.m;
    if (document.activeElement !== inS) inS.value = a.s;

    setHand(hHour, a.hour, sel === "hour", "var(--text)");
    hHourHit.setAttribute("transform", "rotate(" + f(a.hour) + " 100 100)");
    setHand(hMin, a.minute, sel === "minute", "var(--text)");
    setHand(hSec, a.second, sel === "second", "var(--text-3)");

    ringProg.setAttribute("d", strokeArc(a.hour, 92));
    var kp = pt(a.hour, 92);
    knob.setAttribute("cx", f(kp[0])); knob.setAttribute("cy", f(kp[1]));
    knob.setAttribute("aria-valuenow", Math.round(a.hour));

    // selected hand, chosen side
    var theta = a[sel], arcD, labelVal, labelMid;
    if (side === "right") { arcD = sectorSpan(0, theta, 48); labelVal = theta; labelMid = theta / 2; }
    else { if (theta < 0.05) { arcD = ""; labelVal = 0; labelMid = 0; } else { arcD = sectorSpan(theta, 360, 48); labelVal = 360 - theta; labelMid = (theta + 360) / 2; } }
    arc.setAttribute("d", arcD);
    var lp = pt(labelMid, 30);
    arcLabel.setAttribute("x", f(lp[0])); arcLabel.setAttribute("y", f(lp[1]) + 4);
    arcLabel.textContent = fmt(labelVal) + "°";

    // output: both sides for every hand
    setVal($("ro-hour-r"), a.hour);     setVal($("ro-hour-l"), mod(360 - a.hour, 360));
    setVal($("ro-minute-r"), a.minute); setVal($("ro-minute-l"), mod(360 - a.minute, 360));
    setVal($("ro-second-r"), a.second); setVal($("ro-second-l"), mod(360 - a.second, 360));
  }

  function labelUnits() {
    document.querySelectorAll(".au").forEach(function (el) { el.textContent = " " + Shell.t("u." + el.getAttribute("data-u")); });
  }

  // ---- inputs: 0–23 / 0–59 / 0–59 に制限（超過は即クランプ） ----
  function limitField(el, max) {
    el.addEventListener("input", function () {
      var v = el.value.replace(/[^\d]/g, "");
      if (v === "") { readInputs(); return; }
      var n = parseInt(v, 10); if (isNaN(n)) n = 0;
      if (n > max) n = max;
      var sn = String(n);
      if (el.value !== sn) el.value = sn;
      readInputs();
    });
    el.addEventListener("blur", function () { if (el.value === "") el.value = "0"; readInputs(); });
  }
  function readInputs() {
    var h = parseInt(inH.value, 10) || 0, m = parseInt(inM.value, 10) || 0, s = parseInt(inS.value, 10) || 0;
    h = h < 0 ? 0 : h > 23 ? 23 : h; m = m < 0 ? 0 : m > 59 ? 59 : m; s = s < 0 ? 0 : s > 59 ? 59 : s;
    total = h * 3600 + m * 60 + s; render();
  }
  limitField(inH, 23); limitField(inM, 59); limitField(inS, 59);

  $("seg").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    sel = b.getAttribute("data-hand"); syncSeg(); render();
  });
  function syncSeg() { $("seg").querySelectorAll("button").forEach(function (b) { b.setAttribute("aria-pressed", String(b.getAttribute("data-hand") === sel)); }); }

  $("seg-side").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    side = b.getAttribute("data-side"); syncSide(); render();
  });
  function syncSide() { $("seg-side").querySelectorAll("button").forEach(function (b) { b.setAttribute("aria-pressed", String(b.getAttribute("data-side") === side)); }); }

  $("adjust").addEventListener("click", function (e) {
    var b = e.target.closest("button"); if (!b) return;
    total = mod(total + parseInt(b.getAttribute("data-adj"), 10), 86400); render();
  });
  $("now").addEventListener("click", function () {
    var d = new Date(); total = d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds(); render();
  });
  $("reset").addEventListener("click", function () { total = 0; render(); });

  // ---- ring / hour-hand drag（角度差分の積算で境界連続） ----
  var dragging = false, prevA = 0;
  function pointerAngle(e) {
    var r = svg.getBoundingClientRect();
    var dx = e.clientX - (r.left + r.width / 2), dy = e.clientY - (r.top + r.height / 2);
    return Math.atan2(dx, -dy) * 180 / Math.PI;
  }
  function onDown(e) { e.preventDefault(); dragging = true; prevA = pointerAngle(e);
    document.addEventListener("pointermove", onMove); document.addEventListener("pointerup", onUp); }
  function onMove(e) {
    if (!dragging) return;
    var a = pointerAngle(e), d = a - prevA; while (d > 180) d -= 360; while (d < -180) d += 360; prevA = a;
    total = mod(total + (d / 360) * 43200, 86400); render();
  }
  function onUp() { dragging = false; document.removeEventListener("pointermove", onMove); document.removeEventListener("pointerup", onUp); }
  [$("ring-hit"), knob, hHourHit].forEach(function (el) { el.addEventListener("pointerdown", onDown); });

  knob.addEventListener("keydown", function (e) {
    var step = 0;
    if (e.key === "ArrowRight" || e.key === "ArrowUp") step = 60;
    else if (e.key === "ArrowLeft" || e.key === "ArrowDown") step = -60;
    else if (e.key === "PageUp") step = 3600; else if (e.key === "PageDown") step = -3600; else return;
    e.preventDefault(); total = mod(total + step, 86400); render();
  });

  // ---- 起動 ----
  syncSeg(); syncSide();
  Shell.init({
    id: "clock",
    strings: {
      en: {
        "t.title": "Clock hand angles",
        "t.desc": "Set a time and see how far the selected hand has rotated from the 12 o'clock position.",
        "t.time": "Time", "t.hand": "Angle for", "t.side": "Side shown on clock", "t.adjust": "Adjust", "t.now": "Set to now", "t.reset": "Reset to 00:00:00",
        "t.ringhint": "Drag the outer ring or the hour hand — one full turn is 12 hours.",
        "t.hour": "Hour hand", "t.minute": "Minute hand", "t.second": "Second hand",
        "t.right": "Right", "t.left": "Left",
        "t.output": "Output", "t.copyhint": "Click any value to copy.",
        "u.h": "h", "u.m": "m", "u.s": "s"
      },
      ja: {
        "t.title": "時計の針の角度",
        "t.desc": "時刻を設定すると、選択した針が12時方向から何度回転しているかを表示します。",
        "t.time": "時刻", "t.hand": "角度を表示する針", "t.side": "時計に表示する側", "t.adjust": "時刻調整", "t.now": "現在時刻にする", "t.reset": "00:00:00に戻す",
        "t.ringhint": "外周リングか時針をドラッグ。1周で12時間ぶんです。",
        "t.hour": "時針", "t.minute": "分針", "t.second": "秒針",
        "t.right": "右側", "t.left": "左側",
        "t.output": "出力", "t.copyhint": "数値をクリックでコピー。",
        "u.h": "時", "u.m": "分", "u.s": "秒"
      }
    },
    onSettingsChange: function () { labelUnits(); render(); }
  });
  labelUnits(); render();
})();
</script>
</body>
</html>
